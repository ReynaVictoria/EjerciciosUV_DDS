<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <!--Lista de tareas con icono check-->

    <div class="container text-center">
        <h1>Lista de tareas pendientes</h1>


        <div class="row align-items-start">
            <div class="col">
                <ul class="list-group">
                    <li class="list-group-item list-group-item-info d-flex justify-content-between align-items-center">
                        <div>
                            <input class="form-check-input me-1" type="checkbox" value="" id="firstCheckbox">
                            <label class="form-check-label" for="firstCheckbox">Tarea 1</label>
                        </div>

                        <button class="btn btn-primary" type="button">
                            <i class="bi bi-x-circle"></i>
                        </button>
                    </li>
                    <li class="list-group-item list-group-item-info d-flex justify-content-between align-items-center">
                        <div>
                            <input class="form-check-input me-1" type="checkbox" value="" id="firstCheckbox">
                            <label class="form-check-label" for="firstCheckbox">Tarea 2</label>
                        </div>

                        <button class="btn btn-primary" type="button">
                            <i class="bi bi-x-circle"></i>
                        </button>
                    </li>
                    <li class="list-group-item list-group-item-info d-flex justify-content-between align-items-center">
                        <div>
                            <input class="form-check-input me-1" type="checkbox" value="" id="firstCheckbox">
                            <label class="form-check-label" for="firstCheckbox">Tarea 3</label>
                        </div>

                        <button class="btn btn-primary" type="button">
                            <i class="bi bi-x-circle"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>


        <script src="./js/script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>

</html>
